# .github/workflows/deploy.yml
name: Deploy to Production

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: todo-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker images
      run: |
        # Build backend
        docker build -t backend ./backend
        docker tag backend:latest ${{ steps.login-ecr.outputs.registry }}/backend:latest
        docker push ${{ steps.login-ecr.outputs.registry }}/backend:latest
        
        # Build frontend
        docker build -t frontend ./frontend
        docker tag frontend:latest ${{ steps.login-ecr.outputs.registry }}/frontend:latest
        docker push ${{ steps.login-ecr.outputs.registry }}/frontend:latest

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Apply
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve
      env:
        TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    - name: Get EC2 IP
      id: get-ip
      run: |
        cd terraform
        echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

    - name: Run Ansible Playbook
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key
        chmod 600 deploy_key
        ansible-playbook -i "${{ steps.get-ip.outputs.EC2_IP }}," \
          -u ubuntu \
          --private-key deploy_key \
          ansible/playbook.yml
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    - name: Health Check
      run: |
        sleep 30
        curl -f http://${{ steps.get-ip.outputs.EC2_IP }}/api/todos || exit 1
        curl -f http://${{ steps.get-ip.outputs.EC2_IP }} || exit 1
